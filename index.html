        async function init() {
            const savedUser = localStorage.getItem('kirayepe_session_user');
            if(savedUser) {
                try {
                    sessionUser = JSON.parse(savedUser);
                    currentTab = sessionUser.role === 'admin' ? 'admin-panel' : 'explore';
                } catch(e) { localStorage.removeItem('kirayepe_session_user'); }
            }

            try {
                await syncAllUsers();
                await syncProperties();
                await syncBookings();
                await syncNotifications();
                await syncEscrowBalance();
                await syncFraudComplaints();
                await syncLiveMessages();
                setupRealtimeSubscriptions(); // Set up subscriptions ONCE
            } catch(e) { console.log("Engine sync initialized with Supabase."); }

            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.classList.add('opacity-0');
                setTimeout(() => {
                    splash.classList.add('hidden');
                    if(sessionUser) {
                        document.getElementById('app-header').classList.remove('hidden');
                        document.getElementById('main-view').classList.remove('hidden');
                        render();
                    } else {
                        document.getElementById('language-screen').classList.remove('hidden');
                    }
                    if(window.lucide) lucide.createIcons();
                }, 500);
            }, 1800);
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('language-screen').classList.add('hidden');
            document.getElementById('app-header').classList.remove('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            render();
        }

        // REALTIME SUBSCRIPTIONS (INITIALIZED EXACTLY ONCE)
        function setupRealtimeSubscriptions() {
            supabaseClient.channel('users_channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, async () => {
                    await syncAllUsers();
                }).subscribe();

            supabaseClient.channel('properties_channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'properties' }, async () => {
                    await syncProperties();
                }).subscribe();

            supabaseClient.channel('bookings_channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, async () => {
                    await syncBookings();
                }).subscribe();

            supabaseClient.channel('notifications_channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'notifications' }, async () => {
                    await syncNotifications();
                }).subscribe();

            supabaseClient.channel('messages_channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'realmessages' }, async () => {
                    await syncLiveMessages();
                }).subscribe();
        }

        // SUPABASE DATA FETCHING HELPERS
        async function syncProperties() {
            const { data } = await supabaseClient.from('properties').select('*');
            if(data) { databaseProperties = data; render(); }
        }

        async function syncBookings() {
            const { data } = await supabaseClient.from('bookings').select('*');
            if(data) { 
                appBookings = data; 
                const activeEscrowSum = appBookings
                    .filter(b => b.status === "Pending" || b.status === "Approved")
                    .reduce((sum, b) => sum + (Number(b.totalCharged) || 0), 0);
                systemEscrow.balance = activeEscrowSum;
                render(); 
            }
        }

        async function syncNotifications() {
            const { data } = await supabaseClient.from('notifications').select('*').order('timestamp', { ascending: false });
            if(data) { systemNotifications = data; updateNotificationCount(); render(); }
        }

        async function syncEscrowBalance() {
            const { data } = await supabaseClient.from('systemstate').select('*').eq('id', 'escrow').single();
            if(data) { 
                systemEscrow = { ...systemEscrow, ...data }; 
                if(!systemEscrow.adminQrUrl || systemEscrow.adminQrUrl.includes("@ibl")) {
                    systemEscrow.adminQrUrl = ADMIN_PAYMENT_QR;
                }
                render(); 
            }
        }

        async function syncFraudComplaints() {
            const { data } = await supabaseClient.from('complaints').select('*').order('timestamp', { ascending: false });
            if(data) { fraudComplaints = data; render(); }
        }

        async function syncLiveMessages() {
            const { data } = await supabaseClient.from('realmessages').select('*').order('timestamp', { ascending: true });
            if(data) { 
                liveMessagesList = data; 
                if(currentTab === 'chat-room') renderChatRoom(); 
            }
        }

        async function syncAllUsers() {
            const { data, error } = await supabaseClient.from('users').select('*');
            if(error) {
                console.error("Error fetching users from Supabase:", error);
                return;
            }
            if(data) {
                allUsersList = data;
                if(sessionUser && sessionUser.id !== 'ADMIN') {
                    const updatedMe = allUsersList.find(u => u.id === sessionUser.id);
                    if(updatedMe) {
                        sessionUser = updatedMe;
                        localStorage.setItem('kirayepe_session_user', JSON.stringify(sessionUser));
                    }
                }
                render();
            }
        }

        async function uploadFileToCloud(file, pathInfo = "general") {
            if (!file) return "";
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", cloudinaryConfig.uploadPreset);
            formData.append("folder", "kirayepe/" + pathInfo);
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudinaryConfig.cloudName}/upload`, { method: "POST", body: formData });
                const data = await response.json();
                return data.secure_url || data.url || "";
            } catch (error) {
                console.error("Cloudinary Upload Error:", error);
                return "https://via.placeholder.com/150"; 
            }
        }

        async function reportOwnerProfile(ownerId, ownerName) {
            if(!sessionUser) return alert("Please login first to report.");
            
            const reportMsg = prompt(`🚨 Why are you reporting ${ownerName}? Please type your message/reason for Admin:`);
            if(!reportMsg || !reportMsg.trim()) return alert("Report cancelled or empty message provided.");

            try {
                const { error } = await supabaseClient.from("complaints").insert([{
                    reportedOwnerId: ownerId,
                    reportedOwnerName: ownerName,
                    reporterId: sessionUser.id,
                    reporterName: sessionUser.name,
                    reporterRole: sessionUser.role,
                    message: reportMsg.trim(),
                    timestamp: new Date().toISOString()
                }]);

                if(error) throw error;

                await supabaseClient.from("notifications").insert([{
                    userId: "ADMIN",
                    title: "🚨 New Owner Report Received",
                    message: `${sessionUser.name} (${sessionUser.role}) reported Owner ${ownerName}: "${reportMsg.trim()}"`,
                    timestamp: new Date().toISOString()
                }]);

                alert("🚨 Report submitted successfully to Admin Panel!");
                await syncFraudComplaints();
            } catch(e) { alert("Error submitting report: " + e.message); }
        }

        async function adminDeleteOwnerProfile(userId, ownerName) {

                const { error } = await supabaseClient.from("users").delete().eq('id', userId);
                if(error) throw error;
                alert(`🗑️ "${ownerName}" ki listing permanently delete kar di gayi hai!`);
                await syncAllUsers();
            } catch(e) { alert("Delete fail ho gaya: " + e.message); }
        }

            selectedLocation = { 
                lat: 28.6139, 
                lng: 77.2090,

                if(scheduleInput && scheduleInput.value) finalSchedule = scheduleInput.value;
            }

                const bookingId = "BKG" + Math.floor(Math.random()*90000+10000);

        async function disburseOwnerRentPayout(bookingId, totalChargedAmount, originalRent, ownerId, tenantId) {
            try {
                const tenantFee = 200;
                const ownerFee = 200;
                const totalPortalFee = tenantFee + ownerFee; 
                const netOwnerTransferAmount = originalRent - ownerFee; 

                const { error } = await supabaseClient.from("bookings").update({ status: "Released" }).eq('id', bookingId);
                if(error) throw error;

                const newEscrowBalance = Math.max(0, (systemEscrow.balance || 0) - totalChargedAmount);
                const newProfit = (systemEscrow.profit || 0) + totalPortalFee;
                systemEscrow.balance = newEscrowBalance;
                systemEscrow.profit = newProfit;

                await supabaseClient.from("systemstate").upsert({ 
                    id: 'escrow', 
                    balance: newEscrowBalance, 
                    profit: newProfit 
                });

                await supabaseClient.from("notifications").insert([
                    {
                        userId: tenantId,
                        title: "✅ Booking Approved by Admin",
                        message: "Approved by admin",
                        timestamp: new Date().toISOString()
                    },
                    {
                        userId: ownerId,
                        title: "🎉 House Booked!",
                        message: `booked your house! Rent amount ₹${netOwnerTransferAmount} has been directly transferred to your bank account. (Portal Fee: ₹200+₹200 = ₹400)`,
                        timestamp: new Date().toISOString()
                    },
                    {
                        userId: "ADMIN",
                        title: "💸 Release to Owner Completed",
                        message: `Rent payout released to Owner! Direct Payout to Bank: ₹${netOwnerTransferAmount}. Portal Fee Earned: ₹200 + ₹200 = ₹400.`,
                        timestamp: new Date().toISOString()
                    }
                ]);

                alert(`💸 Money Successfully Disbursed to Owner!\n\n• Tenant Notification: "Approved by admin"\n• Owner Notification: "booked your house"\n• Direct Owner Bank Payout: ₹${netOwnerTransferAmount}\n• Portal Service Fee: 200 + 200 = ₹400`);
                
                await syncBookings();
                await syncNotifications();
                await syncEscrowBalance();
                render();
            } catch(e) { alert("Payout Error: " + e.message); }
        }

                            <button onclick="saveOwnerCustomLocation()" class="w-full bg-blue-600 text-white font-bold text-[10px] py-2 rounded-xl uppercase flex justify-center items-center gap-1">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> Save Location Name & Google Map Link
                            </button>
                        </div>

                        <div class="p-4 bg-white border rounded-2xl space-y-2">
                            <label class="text-[11px] font-bold text-gray-800 block">📅 Set Timings / Schedule</label>
                            <div class="flex gap-1.5">
                                <input type="text" id="owner-schedule-input-box" value="${sessionUser.myCustomSchedule || ''}" class="w-full p-2 border bg-gray-50 text-xs rounded-xl">
                                <button onclick="saveOwnerSchedule()" class="bg-indigo-600 text-white font-bold text-[10px] px-3 rounded-xl uppercase">Save Timing</button>
                            </div>
                        </div>

                        <div class="p-4 bg-white border rounded-2xl space-y-2">
                            <label class="text-[11px] font-bold text-gray-800 block">💰 Rent Amount (₹)</label>
                            <div class="flex gap-2">
                                <input type="number" id="owner-rent-input" value="${sessionUser.rentAmount || 12000}" class="w-full p-2 border bg-gray-50 text-xs font-bold rounded-xl">
                                <button onclick="updateOwnerRent()" class="bg-emerald-600 text-xs px-4 rounded-xl text-white font-bold">Update</button>
                            </div>
                        </div>

                        <div class="p-4 bg-white border rounded-2xl space-y-2">
                            <label class="text-[11px] font-bold text-gray-800 block">🎥 Update Virtual Tour Video</label>
                            <input type="file" id="owner-video-file" accept="video/*" class="w-full p-2 border bg-gray-50 text-xs rounded-xl">
                            <button onclick="uploadHouseVideo()" class="w-full bg-blue-600 text-white text-xs font-bold py-2 rounded-xl">Upload Live Video</button>
                        </div>

                        <div class="p-4 bg-white border rounded-2xl space-y-2">
                            <label class="text-[11px] font-bold text-gray-800 block">📝 House Rules & Description</label>
                            <textarea id="owner-free-desc" rows="3" class="w-full p-2.5 border bg-gray-50 text-xs rounded-xl">${sessionUser.availabilitySchedule || ''}</textarea>
                            <button onclick="updateAvailability()" class="w-full bg-indigo-600 text-white text-xs font-bold py-2 rounded-xl">SAVE DATA</button>
                        </div>
                    </div>`;
            }

            else if(currentTab === 'admin-panel') {
                const unverifiedOwners = allUsersList.filter(u => u.role === 'owner' && !u.isVerifiedOwner);
                const registeredOwners = allUsersList.filter(u => u.role === 'owner');
                const managedBookings = appBookings;

                main.innerHTML = `
                    <div class="space-y-6">
                        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 rounded-2xl text-white shadow-md flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-sm">Direct App Navigation</h3>
                                <p class="text-[10px] text-blue-100">Check house listings & live listings directly</p>
                            </div>
                            <button onclick="switchTab('explore')" class="bg-white text-blue-600 font-black text-xs px-3.5 py-2 rounded-xl shadow hover:bg-blue-50 transition">
                                🌐 Explore App
                            </button>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-white border rounded-2xl p-4 text-center shadow-sm">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block">Escrow Volume</span>
                                <h2 class="text-xl font-black text-blue-600 mt-1">₹${systemEscrow.balance || 0}</h2>
                            </div>
                            <div class="bg-white border rounded-2xl p-4 text-center shadow-sm">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block">Portal Fees Earned</span>
                                <h2 class="text-xl font-black text-emerald-600 mt-1">₹${systemEscrow.profit || 0}</h2>
                            </div>
                        </div>

                        <div class="bg-white border rounded-2xl p-4 space-y-2">
                            <h4 class="text-xs font-black text-blue-600 uppercase">Paste Admin QR Link</h4>
                            <input type="text" id="admin-qr-input-url" value="${systemEscrow.adminQrUrl || ADMIN_PAYMENT_QR}" class="w-full p-2 border bg-gray-50 rounded-xl text-xs">
                            <button onclick="saveAdminQrCode()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-xl text-xs">Update QR Engine</button>
                        </div>

                        <!-- OWNER DOCUMENT VERIFICATION CENTER -->
                        <div class="bg-white border-2 border-blue-500 rounded-2xl p-4 space-y-3 shadow-sm">
                            <h4 class="text-xs font-black text-blue-700 uppercase flex items-center justify-between">
                                <span class="flex items-center gap-1.5"><i data-lucide="file-check" class="w-4 h-4 text-blue-600"></i> 📄 Owner Document Verification Center</span>
                                <span class="text-[10px] bg-blue-100 text-blue-800 font-bold px-2 py-0.5 rounded">${unverifiedOwners.length} Pending Documents</span>
                            </h4>
                            ${unverifiedOwners.length === 0 ? `<p class="text-xs text-gray-400 py-2">No owner documents currently waiting for verification.</p>` : unverifiedOwners.map(u => `
                                <div class="p-3 bg-blue-50/60 rounded-xl border border-blue-200 text-xs space-y-2">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-2">
                                            <img src="${u.photo || 'https://via.placeholder.com/150'}" class="w-9 h-9 rounded-full object-cover border-2 border-blue-500">
                                            <div>
                                                <p class="font-bold text-gray-900">${u.name}</p>
                                                <p class="text-[10px] text-gray-600">📞 Phone: ${u.phone}</p>
                                                <p class="text-[9px] text-blue-700 font-bold">Loc: ${u.markedLocation?.name || 'Delhi'}</p>
                                            </div>
                                        </div>
                                        <span class="text-[9px] font-bold bg-amber-100 text-amber-800 px-2 py-0.5 rounded">Unverified</span>
                                    </div>
                                    
                                    ${u.documentUrl ? `
                                        <div class="p-2 bg-white rounded-lg border flex justify-between items-center">
                                            <span class="text-[10px] font-bold text-gray-700 truncate max-w-[180px]">📄 ${u.originalDocName || 'Uploaded Document'}</span>
                                            <a href="${u.documentUrl}" target="_blank" class="text-xs bg-blue-600 text-white font-bold px-2.5 py-1 rounded-md flex items-center gap-1">
                                                <i data-lucide="external-link" class="w-3 h-3"></i> View Document
                                            </a>
                                        </div>
                                    ` : `<p class="text-[10px] text-red-500 italic">No document file attached.</p>`}
                                    
                                    <div class="flex gap-2 pt-1">
                                        <button onclick="approveOwner('${u.id}')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-1.5 rounded-lg text-[10px] flex justify-center items-center gap-1">
                                            <i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Verify & Approve Owner
                                        </button>
                                        <button onclick="deleteOwnerDocument('${u.id}')" class="bg-red-600 hover:bg-red-700 text-white font-bold px-3 py-1.5 rounded-lg text-[10px] flex justify-center items-center gap-1">
                                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Delete Document
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="bg-white border rounded-2xl p-4 space-y-3">
                            <h4 class="text-xs font-black text-blue-600 uppercase flex items-center justify-between">
                                <span>👥 All Owner Profiles & Fake Listings Delete</span>
                                <span class="text-[10px] bg-blue-50 px-2 py-0.5 rounded text-blue-800">${registeredOwners.length} Registered</span>
                            </h4>
                            ${registeredOwners.length === 0 ? `<p class="text-xs text-gray-400 py-2">No owners registered yet.</p>` : registeredOwners.map(o => `
                                <div class="p-3 bg-gray-50 rounded-xl border text-xs flex items-center justify-between gap-2">
                                    <div class="flex items-center gap-3">
                                        <img src="${o.photo || 'https://via.placeholder.com/150'}" class="w-10 h-10 rounded-full object-cover border-2 border-blue-600 shadow-sm">
                                        <div>
                                            <p class="font-bold text-gray-900">${o.name}</p>
                                            <p class="text-[11px] font-bold text-emerald-700">📞 Phone: ${o.phone || 'N/A'}</p>
                                            <p class="text-[9px] text-gray-500">Rent: ₹${o.rentAmount || 12000} | Status: ${o.isVerifiedOwner ? 'Verified' : 'Pending'}</p>
                                        </div>
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <button onclick="switchTab('explore')" class="text-[10px] bg-blue-600 text-white font-bold px-2 py-1 rounded-lg">View Listing</button>
                                        <button onclick="adminDeleteOwnerProfile('${o.id}', '${o.name}')" class="text-[10px] bg-red-600 text-white font-bold px-2 py-1 rounded-lg flex items-center gap-0.5 justify-center">
                                            <i data-lucide="trash-2" class="w-3 h-3"></i> Delete
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="bg-white border rounded-2xl p-4 space-y-3">
                            <h4 class="text-xs font-black text-red-600 uppercase flex items-center justify-between">
                                <span class="flex items-center gap-1"><i data-lucide="alert-circle" class="w-4 h-4 text-red-600"></i> 🚨 Fraud & User Reports Center</span>
                                <span class="text-[10px] bg-red-50 text-red-800 px-2 py-0.5 rounded">${fraudComplaints.length} Reports</span>
                            </h4>
                            ${fraudComplaints.length === 0 ? `<p class="text-xs text-gray-400 py-2">No reports submitted yet.</p>` : fraudComplaints.map(c => `
                                <div class="p-3 bg-red-50 border border-red-200 rounded-xl text-xs space-y-1 relative">
                                    <div class="flex justify-between items-start font-bold text-red-900">
                                        <span>Reported Owner: ${c.reportedOwnerName || 'N/A'}</span>
                                        <button onclick="adminDeleteComplaintReport('${c.id}')" class="bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1 shadow-sm">
                                            <i data-lucide="trash-2" class="w-3 h-3"></i> Delete Report
                                        </button>
                                    </div>
                                    <p class="text-[11px] text-gray-700"><b>Reported By:</b> ${c.reporterName} (${c.reporterRole})</p>
                                    <div class="p-2 bg-white rounded-lg border border-red-100 text-gray-800 font-medium italic mt-1">
                                        "${c.message}"
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <!-- ESCROW PAYMENTS & RELEASE TO OWNER PANEL -->
                        <div class="bg-white border-2 border-indigo-500 rounded-2xl p-4 space-y-3 shadow-md">
                            <h4 class="text-xs font-black text-indigo-900 uppercase flex items-center justify-between">
                                <span>💳 QR Payments Verification & Escrow Payouts</span>
                                <span class="text-[10px] bg-indigo-100 text-indigo-900 px-2 py-0.5 rounded font-bold">${managedBookings.length} Records</span>
                            </h4>
                            ${managedBookings.length === 0 ? `<p class="text-xs text-gray-400 py-2">No payment records in Escrow yet.</p>` : managedBookings.map(b => `
                                <div class="p-3 bg-indigo-50/70 rounded-xl border border-indigo-200 text-xs space-y-2 relative">
                                    <div class="flex justify-between items-start border-b border-indigo-200 pb-2">
                                        <div>
                                            <p class="font-bold text-gray-900">Tenant: ${b.tenantName} <span class="text-[10px] text-gray-500">(Ph: ${b.tenantPhone || 'N/A'})</span></p>
                                            <p class="text-indigo-900 font-bold">Owner: ${b.ownerName} <span class="bg-amber-100 text-amber-900 px-1.5 py-0.5 rounded text-[10px]">Ph: ${b.ownerPhone || 'N/A'}</span></p>
                                            <p class="text-emerald-700 font-bold mt-1">Total Charged: ₹${b.totalCharged} (Rent: ₹${b.rentAmount} + Fee: ₹200)</p>
                                            <p class="text-purple-800 font-bold text-[10px]">Portal Fee: 200 (Tenant) + 200 (Owner) = <b>₹400</b></p>
                                            ${b.utrNumber ? `<p class="text-[11px] font-mono font-bold text-blue-800 bg-blue-100/80 px-2 py-0.5 rounded mt-1 inline-block">📲 UPI/UTR Ref: ${b.utrNumber}</p>` : ''}
                                        </div>
                                        <div class="flex flex-col items-end gap-1">
                                            <span class="px-2 py-0.5 text-[9px] font-bold rounded ${b.status === 'Approved' ? 'bg-emerald-100 text-emerald-800' : b.status === 'Released' ? 'bg-blue-100 text-blue-800' : 'bg-amber-100 text-amber-800'}">
                                                ${b.status ? b.status.toUpperCase() : 'PENDING'}
                                            </span>
                                            <button onclick="adminDeleteBookingRecord('${b.id}')" class="bg-red-600 text-white font-bold px-2 py-1 rounded text-[10px] flex items-center gap-1 shadow-sm mt-1">
                                                <i data-lucide="trash-2" class="w-3 h-3"></i> Delete
                                            </button>
                                        </div>
                                    </div>

                                    <div class="space-y-1 pt-1">
                                        ${b.status === 'Pending' || !b.status ? `
                                            <button onclick="adminApprovePayment('${b.id}', '${b.tenantId}')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg text-[10px] shadow-sm uppercase">
                                                ✅ APPROVE PAYMENT (Show "Approved by admin" to Tenant)
                                            </button>
                                        ` : ''}

                                        ${b.status !== 'Released' ? `
                                            <button onclick="disburseOwnerRentPayout('${b.id}', ${b.totalCharged}, ${b.rentAmount}, '${b.ownerId}', '${b.tenantId}')" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-black py-2.5 rounded-lg text-[10px] shadow-sm uppercase">
                                                💸 RELEASE TO OWNER (Bank Payout: ₹${b.rentAmount - 200} | Portal Fee: 200+200=400)
                                            </button>
                                        ` : `<p class="text-[10px] text-emerald-700 bg-emerald-50 p-1.5 rounded font-bold border text-center">✔ Released to Owner Bank. Portal Fee Earned: ₹400.</p>`}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
            if(window.lucide) lucide.createIcons();
        }

        init();
    </script>
</body>
    </html>
